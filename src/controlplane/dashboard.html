<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wrangl · Control Plane</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%8C%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f7f7f8; --panel: #ffffff; --border: #e5e5ea; --text: #1d1d1f;
    --muted: #6e6e73; --accent: #2f6df6; --accent-fg: #ffffff;
    --ok: #1a7f37; --err: #c62828; --code-bg: #f0f0f2; --shadow: rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1c; --panel: #242426; --border: #3a3a3d; --text: #f2f2f4;
      --muted: #9a9aa0; --accent: #4d8bff; --accent-fg: #0b0b0c;
      --ok: #4ac66b; --err: #ff6b6b; --code-bg: #2c2c30; --shadow: rgba(0,0,0,.3);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--border); background: var(--panel);
    position: sticky; top: 0; z-index: 5;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: -.01em; }
  header .badge {
    font-size: 12px; color: var(--muted); background: var(--code-bg);
    padding: 2px 8px; border-radius: 999px;
  }
  header .spacer { flex: 1; }
  .layout { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px 20px; align-items: start; }
  @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 1px 2px var(--shadow); overflow: hidden;
  }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    margin: 0; padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; }
  form { padding: 14px; display: grid; gap: 8px; }
  label { font-size: 12px; color: var(--muted); }
  input, textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font: inherit; font-size: 13px;
  }
  textarea { resize: vertical; min-height: 54px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  button {
    font: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: 7px 12px; border-radius: 8px;
  }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: transparent; }
  button:disabled { opacity: .5; cursor: default; }
  button.ghost { background: transparent; }
  ul.servers { list-style: none; margin: 0; padding: 6px; display: grid; gap: 4px; }
  ul.servers li {
    padding: 9px 11px; border-radius: 8px; cursor: pointer; border: 1px solid transparent;
    display: flex; align-items: center; gap: 8px;
  }
  ul.servers li:hover { background: var(--bg); }
  ul.servers li.active { background: var(--bg); border-color: var(--border); }
  ul.servers .name { font-weight: 500; }
  ul.servers .meta { color: var(--muted); font-size: 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); flex: none; }
  .detail { min-height: 300px; }
  .detail .head { padding: 14px; border-bottom: 1px solid var(--border); }
  .detail .head .title { font-size: 17px; font-weight: 600; }
  .detail .head .sub { color: var(--muted); font-size: 12px; margin-top: 3px; word-break: break-all; }
  .urlbar { display: flex; gap: 8px; margin-top: 10px; }
  .urlbar code { flex: 1; background: var(--code-bg); padding: 7px 10px; border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; overflow-x: auto; white-space: nowrap; }
  .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tabs { display: flex; gap: 4px; padding: 10px 14px 0; }
  .tabs button { border: none; border-bottom: 2px solid transparent; border-radius: 0; padding: 6px 10px; color: var(--muted); background: none; }
  .tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
  .tabpanel { padding: 8px 14px 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  td code { background: var(--code-bg); padding: 1px 6px; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .method { font-weight: 700; font-size: 11px; }
  .status-ok { color: var(--ok); font-weight: 600; }
  .status-err { color: var(--err); font-weight: 600; }
  .empty { color: var(--muted); padding: 40px 14px; text-align: center; }
  details.tool { border: 1px solid var(--border); border-radius: 9px; margin-bottom: 6px; background: var(--panel); }
  details.tool summary {
    cursor: pointer; padding: 9px 11px; display: flex; align-items: center; gap: 9px;
    list-style: none; border-radius: 9px;
  }
  details.tool summary::-webkit-details-marker { display: none; }
  details.tool[open] summary { border-bottom: 1px solid var(--border); }
  details.tool summary:hover { background: var(--bg); }
  .tool-path { margin-left: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 45%; }
  .tool-body { padding: 12px; }
  form.tool-form { display: flex; flex-direction: column; gap: 8px; }
  .field { display: grid; gap: 3px; font-size: 12px; }
  .field > span { color: var(--text); }
  .field input, .field textarea {
    padding: 7px 9px; border: 1px solid var(--border); border-radius: 7px;
    background: var(--bg); color: var(--text); font: inherit; font-size: 13px;
  }
  .field textarea { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; resize: vertical; }
  .tool-result { margin-top: 10px; }
  pre.response {
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; margin: 0; overflow: auto; max-height: 320px; font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  /* analytics */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .tile { border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; background: var(--panel); }
  .tile .num { font-size: 23px; font-weight: 600; letter-spacing: -.02em; }
  .tile .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 3px; }
  .barchart { display: flex; align-items: flex-end; gap: 2px; height: 100px; padding-top: 2px; }
  .bar-wrap { flex: 1; display: flex; align-items: flex-end; height: 100%; min-width: 0; }
  /* single-series bars: accent hue, rounded top ends anchored to the baseline */
  .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; transition: opacity .1s; }
  .bar-wrap:hover .bar { opacity: .65; }
  .axis-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 9px 16px; border-radius: 999px;
    font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 10;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>Wrangl</h1>
  <span class="badge" id="server-count">…</span>
  <span class="spacer"></span>
  <input id="admin-token" type="password" placeholder="Admin token (if required)"
    style="width:200px;padding:5px 9px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font:inherit;font-size:12px" />
  <span class="badge">control plane</span>
</header>

<div class="layout">
  <div style="display:grid; gap:16px;">
    <div class="card">
      <h2>New server</h2>
      <form id="create-form">
        <div>
          <label for="f-spec">OpenAPI spec or Postman collection (URL or path)</label>
          <textarea id="f-spec" placeholder="https://petstore3.swagger.io/api/v3/openapi.json" required></textarea>
        </div>
        <div>
          <label for="f-name">Name (optional)</label>
          <input id="f-name" placeholder="Petstore" />
        </div>
        <div>
          <label for="f-base">Base URL override (optional)</label>
          <input id="f-base" placeholder="https://api.example.com" />
        </div>
        <button type="submit" class="primary" id="create-btn">Create server</button>
      </form>
    </div>

    <div class="card">
      <h2>Servers</h2>
      <ul class="servers" id="server-list"></ul>
    </div>
  </div>

  <div class="card detail" id="detail">
    <div class="empty">Select a server, or create one to get started.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = (s, el = document) => el.querySelector(s);
let selected = null;
let activeTab = "tools";
let currentDetail = null;

function toast(msg) {
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove("show"), 1800);
}

function adminToken() { return localStorage.getItem("wrangl_admin_token") || ""; }

async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers);
  const tok = adminToken();
  if (tok) headers["Authorization"] = "Bearer " + tok;
  const res = await fetch(path, Object.assign({}, opts, { headers }));
  const type = res.headers.get("content-type") || "";
  const body = type.includes("json") ? await res.json() : await res.text();
  if (res.status === 401) throw new Error("Unauthorized — set the admin token (top right).");
  if (!res.ok) throw new Error((body && body.error) || ("HTTP " + res.status));
  return body;
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

async function loadServers() {
  const servers = await api("/servers");
  $("#server-count").textContent = servers.length + (servers.length === 1 ? " server" : " servers");
  const list = $("#server-list");
  if (!servers.length) { list.innerHTML = '<li class="meta" style="cursor:default">No servers yet.</li>'; return; }
  list.innerHTML = servers.map((s) => `
    <li data-id="${esc(s.id)}" class="${s.id === selected ? "active" : ""}">
      <span class="dot"></span>
      <span style="flex:1; min-width:0">
        <div class="name">${esc(s.name)}</div>
        <div class="meta">${s.toolCount} tools · ${esc(s.slug)}</div>
      </span>
    </li>`).join("");
  list.querySelectorAll("li[data-id]").forEach((li) =>
    li.addEventListener("click", () => selectServer(li.dataset.id)));
}

async function selectServer(id) {
  selected = id;
  await loadServers();
  const s = await api("/servers/" + id);
  currentDetail = s;
  const mcpUrl = location.origin + s.mcpPath;
  $("#detail").innerHTML = `
    <div class="head">
      <div class="title">${esc(s.name)}</div>
      <div class="sub">${esc(s.baseUrl)} · ${s.toolCount} tools · spec ${esc(s.specHash)}</div>
      <div class="urlbar">
        <code id="mcp-url">${esc(mcpUrl)}</code>
        <button id="copy-url">Copy URL</button>
      </div>
      ${s.mcpToken ? `<div class="urlbar">
        <code id="mcp-token">Bearer ${esc(s.mcpToken)}</code>
        <button id="copy-token">Copy token</button>
      </div>
      <p class="meta" style="margin:6px 0 0">Agents must send this token as an <code>Authorization</code> header.</p>` : ""}
      <div class="actions">
        ${s.mcpToken ? '<button id="copy-config">Copy MCP config</button>' : ""}
        <button id="regen-btn" class="ghost">Regenerate</button>
        <button id="del-btn" class="ghost" style="color:var(--err)">Delete</button>
      </div>
    </div>
    <div class="tabs">
      <button data-tab="tools" class="${activeTab === "tools" ? "active" : ""}">Tools</button>
      <button data-tab="logs" class="${activeTab === "logs" ? "active" : ""}">Logs</button>
      <button data-tab="analytics" class="${activeTab === "analytics" ? "active" : ""}">Analytics</button>
      <button data-tab="creds" class="${activeTab === "creds" ? "active" : ""}">Credentials</button>
    </div>
    <div class="tabpanel" id="tabpanel"></div>`;

  $("#copy-url").addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(mcpUrl); toast("MCP URL copied"); }
    catch { toast("Copy failed — select manually"); }
  });
  const copyTok = $("#copy-token");
  if (copyTok) copyTok.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText("Bearer " + s.mcpToken); toast("Token copied"); }
    catch { toast("Copy failed — select manually"); }
  });
  const copyCfg = $("#copy-config");
  if (copyCfg) copyCfg.addEventListener("click", async () => {
    const config = { mcpServers: { [s.slug]: { url: mcpUrl, headers: { Authorization: "Bearer " + s.mcpToken } } } };
    try { await navigator.clipboard.writeText(JSON.stringify(config, null, 2)); toast("MCP config copied"); }
    catch { toast("Copy failed"); }
  });
  $("#regen-btn").addEventListener("click", () => regenerate(id));
  $("#del-btn").addEventListener("click", () => removeServer(id, s.name));
  $("#detail").querySelectorAll(".tabs button").forEach((b) =>
    b.addEventListener("click", () => { activeTab = b.dataset.tab; selectServer(id); }));

  renderTab(id);
}

async function renderTab(id) {
  const panel = $("#tabpanel");
  panel.innerHTML = '<div class="empty">Loading…</div>';
  try {
    if (activeTab === "tools") {
      await renderTools(id, panel);
    } else if (activeTab === "logs") {
      await renderLogs(id, panel);
    } else if (activeTab === "analytics") {
      await renderAnalytics(id, panel);
    } else {
      await renderCredentials(id, panel);
    }
  } catch (e) { panel.innerHTML = '<div class="empty">' + esc(e.message) + "</div>"; }
}

async function renderTools(id, panel) {
  const tools = await api("/servers/" + id + "/tools");
  if (!tools.length) { panel.innerHTML = '<div class="empty">No tools.</div>'; return; }
  panel.innerHTML = `
    <input id="tool-search" placeholder="Filter ${tools.length} tools…"
      style="width:100%;margin-bottom:10px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font:inherit;font-size:13px" />
    <div id="tool-list">${tools.map(toolCard).join("")}</div>`;

  // Filter as you type.
  $("#tool-search").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    panel.querySelectorAll("details.tool").forEach((d) => {
      const hay = (d.dataset.name + " " + d.dataset.path).toLowerCase();
      d.style.display = hay.includes(q) ? "" : "none";
    });
  });

  // Wire each tool's Run button.
  panel.querySelectorAll("form.tool-form").forEach((form) => {
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = form.dataset.name;
      const out = form.parentElement.querySelector(".tool-result");
      const btn = form.querySelector("button");
      const args = {};
      form.querySelectorAll("[data-param]").forEach((inp) => {
        if (inp.value === "") return;
        args[inp.dataset.param] = coerce(inp.value, inp.dataset.type);
      });
      const bodyEl = form.querySelector("[data-body]");
      if (bodyEl && bodyEl.value.trim()) {
        try { args.body = JSON.parse(bodyEl.value); }
        catch { out.innerHTML = '<div class="status-err">Body is not valid JSON.</div>'; return; }
      }
      btn.disabled = true; btn.textContent = "Running…";
      out.innerHTML = '<div class="meta">Calling…</div>';
      try {
        const res = await api("/servers/" + id + "/tools/" + encodeURIComponent(name) + "/invoke", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify(args),
        });
        out.innerHTML = `<div class="${res.ok ? "status-ok" : "status-err"}" style="margin-bottom:6px">HTTP ${res.statusCode}${res.ok ? "" : " (error)"}</div><pre class="response">${esc(prettyJson(res.body))}</pre>`;
      } catch (err) {
        out.innerHTML = '<div class="status-err">' + esc(err.message) + "</div>";
      } finally {
        btn.disabled = false; btn.textContent = "Run";
      }
    });
  });
}

function toolCard(t) {
  const authNote = t.security && t.security.length
    ? `<span class="meta">🔒 needs ${esc(t.security.join(", "))} — set it in Credentials</span>` : "";
  const inputs = t.params.map((p) => `
    <label class="field">
      <span>${esc(p.name)} <span class="meta">${esc(p.in)}${p.required ? " · required" : ""}${p.type ? " · " + esc(p.type) : ""}</span></span>
      <input data-param="${esc(p.name)}" data-type="${esc(p.type || "string")}" placeholder="${p.required ? "required" : "optional"}" />
    </label>`).join("");
  const bodyField = t.hasBody ? `
    <label class="field">
      <span>body <span class="meta">JSON</span></span>
      <textarea data-body rows="4" placeholder='{ }'></textarea>
    </label>` : "";
  return `<details class="tool" data-name="${esc(t.name)}" data-path="${esc(t.path)}">
    <summary>
      <span class="method">${esc(t.method)}</span>
      <code>${esc(t.name)}</code>
      <span class="meta tool-path">${esc(t.path)}</span>
    </summary>
    <div class="tool-body">
      <div class="meta" style="margin:0 0 8px">${esc(t.description || "")}</div>
      ${authNote}
      <form class="tool-form" data-name="${esc(t.name)}">
        ${inputs || '<div class="meta">No parameters.</div>'}
        ${bodyField}
        <button type="submit" class="primary" style="margin-top:8px;align-self:flex-start">Run</button>
      </form>
      <div class="tool-result"></div>
    </div>
  </details>`;
}

function coerce(value, type) {
  if (type === "integer" || type === "number") {
    const n = Number(value);
    return Number.isNaN(n) ? value : n;
  }
  if (type === "boolean") return value === "true" || value === "1";
  return value;
}

function prettyJson(text) {
  try { return JSON.stringify(JSON.parse(text), null, 2); } catch { return text; }
}

async function renderLogs(id, panel) {
  const logs = await api("/servers/" + id + "/logs?limit=100");
  if (!logs.length) { panel.innerHTML = '<div class="empty">No calls logged yet — run a tool from the Tools tab.</div>'; return; }
  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="meta">${logs.length} recent calls · click a row for payloads</span>
      <button id="logs-refresh" class="ghost">Refresh</button>
    </div>
    ${logs.map((l) => `<details class="tool">
      <summary>
        <span class="${l.error ? "status-err" : "status-ok"}">${l.error ? "ERR" : l.status_code}</span>
        <code>${esc(l.tool)}</code>
        <span class="meta">${esc(l.method)}</span>
        <span class="meta tool-path">${new Date(l.timestamp).toLocaleTimeString()} · ${l.latency_ms}ms</span>
      </summary>
      <div class="tool-body">
        ${l.error ? `<div class="status-err" style="margin-bottom:6px">${esc(l.error)}</div>` : ""}
        <div class="meta" style="margin-bottom:4px">request args</div>
        <pre class="response">${esc(prettyJson(l.request_body || "{}"))}</pre>
        ${l.response_body ? `<div class="meta" style="margin:8px 0 4px">response body</div>
        <pre class="response">${esc(prettyJson(l.response_body))}</pre>` : ""}
      </div>
    </details>`).join("")}`;
  $("#logs-refresh").addEventListener("click", () => renderTab(id));
}

async function renderAnalytics(id, panel) {
  const s = await api("/servers/" + id + "/stats");
  if (!s.total) {
    panel.innerHTML = '<div class="empty">No calls yet — run some tools (Tools tab) to see analytics.</div>';
    return;
  }
  const errPct = (s.errorRate * 100).toFixed(1);
  const errClass = s.errorRate === 0 ? "status-ok" : s.errorRate < 0.1 ? "" : "status-err";
  const max = Math.max(...s.hourly.map((h) => h.count), 1);
  const bars = s.hourly.map((h) => {
    const pct = h.count ? Math.max(4, Math.round((h.count / max) * 100)) : 0;
    const hr = new Date(h.t).getHours();
    return `<div class="bar-wrap" title="${String(hr).padStart(2, "0")}:00 · ${h.count} call${h.count === 1 ? "" : "s"}">
      <div class="bar" style="height:${pct}%"></div>
    </div>`;
  }).join("");

  panel.innerHTML = `
    <div class="tiles">
      <div class="tile"><div class="num">${s.total.toLocaleString()}</div><div class="lbl">total calls</div></div>
      <div class="tile"><div class="num ${errClass}">${errPct}%</div><div class="lbl">error rate</div></div>
      <div class="tile"><div class="num">${s.p95}<span style="font-size:14px">ms</span></div><div class="lbl">p95 · p50 ${s.p50}ms</div></div>
    </div>
    <div class="meta" style="margin:0 0 4px">Calls per hour (last 24h) · peak ${max}</div>
    <div class="barchart">${bars}</div>
    <div class="axis-labels"><span>24h ago</span><span>now</span></div>
    <div class="meta" style="margin:16px 0 4px">By tool</div>
    <table>
      <thead><tr><th>Tool</th><th>Calls</th><th>Errors</th><th>p95</th></tr></thead>
      <tbody>${s.perTool.map((t) => `<tr>
        <td><code>${esc(t.tool)}</code></td>
        <td>${t.calls}</td>
        <td class="${t.errors ? "status-err" : "meta"}">${t.errors}</td>
        <td class="meta">${t.p95}ms</td>
      </tr>`).join("")}</tbody>
    </table>`;
}

async function renderCredentials(id, panel) {
  const schemes = (currentDetail && currentDetail.securitySchemes) || [];
  if (!schemes.length) {
    panel.innerHTML = '<div class="empty">This API requires no credentials.</div>';
    return;
  }
  // OAuth statuses (connected?) drive the oauth2 blocks.
  let statusBy = {};
  try {
    const statuses = await api("/servers/" + id + "/oauth");
    for (const st of statuses) statusBy[st.scheme] = st;
  } catch { /* oauth may be disabled — treat as unconfigured */ }

  panel.innerHTML = `
    <p class="meta" style="margin:2px 0 12px">
      Credentials are injected server-side at request time and never returned. With
      <code>WRANGL_SECRET_KEY</code> set they're encrypted at rest.
    </p>
    ${schemes.map((s, i) => (s.type === "oauth2" || s.type === "openIdConnect")
      ? oauthBlock(s, i, statusBy[s.name])
      : valueBlock(s, i)).join("")}`;

  // Static credential schemes (apiKey/http): set a value.
  panel.querySelectorAll("button[data-set]").forEach((btn) =>
    btn.addEventListener("click", async () => {
      const value = $("#cred-" + btn.dataset.i).value;
      if (!value) { toast("Enter a value"); return; }
      try {
        await api("/servers/" + id + "/credentials", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ scheme: btn.dataset.set, value }),
        });
        $("#cred-" + btn.dataset.i).value = "";
        toast("Credential set for " + btn.dataset.set);
      } catch (e) { toast(e.message); }
    }));

  // OAuth2 / OIDC: save client config, then authorize (user) or client-credentials (M2M).
  panel.querySelectorAll("button[data-oauth]").forEach((btn) =>
    btn.addEventListener("click", async () => {
      const scheme = btn.dataset.oauth, i = btn.dataset.i, grant = btn.dataset.grant;
      const clientId = $("#oa-cid-" + i).value.trim();
      if (!clientId) { toast("Client ID required"); return; }
      const payload = { clientId };
      const secret = $("#oa-sec-" + i).value.trim();
      if (secret) payload.clientSecret = secret;
      try {
        await api("/servers/" + id + "/oauth/" + encodeURIComponent(scheme) + "/config", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (grant === "client_credentials") {
          await api("/servers/" + id + "/oauth/" + encodeURIComponent(scheme) + "/client-credentials", {
            method: "POST",
          });
          toast("Connected via client credentials");
          renderTab(id);
          return;
        }
        const { url } = await api("/servers/" + id + "/oauth/" + encodeURIComponent(scheme) + "/authorize");
        window.open(url, "_blank");
        toast("Opening authorization… complete it, then Refresh");
      } catch (e) { toast(e.message); }
    }));
  panel.querySelectorAll(".creds-refresh").forEach((b) =>
    b.addEventListener("click", () => renderTab(id)));
}

function valueBlock(s, i) {
  const isSet = ((currentDetail && currentDetail.credentialsSet) || []).includes(s.name);
  const badge = isSet ? ' <span class="status-ok">● set</span>' : "";
  return `<div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:10px">
    <div style="flex:1">
      <label>${esc(s.name)} <span class="meta">(${esc(s.type)} · ${esc(s.detail || "")})</span>${badge}</label>
      <input type="password" id="cred-${i}" placeholder="${s.type === "http" && s.detail === "basic" ? "user:password" : "value"}" />
    </div>
    <button data-set="${esc(s.name)}" data-i="${i}" class="primary">${isSet ? "Replace" : "Set"}</button>
  </div>`;
}

function oauthBlock(s, i, status) {
  const connected = status && status.connected;
  const badge = connected
    ? '<span class="status-ok">● connected</span>'
    : '<span class="meta">not connected</span>';
  const flows = (status && status.flows) || s.flows || ["authorizationCode"];
  const kind = s.type === "openIdConnect" ? "oidc" : "oauth2";
  const authCode = flows.includes("authorizationCode");
  const clientCreds = flows.includes("clientCredentials");
  const buttons = [];
  if (authCode) {
    buttons.push(`<button data-oauth="${esc(s.name)}" data-i="${i}" data-grant="authorization_code" class="primary">${connected ? "Reconnect" : "Connect"}</button>`);
  }
  if (clientCreds) {
    buttons.push(`<button data-oauth="${esc(s.name)}" data-i="${i}" data-grant="client_credentials" class="${authCode ? "ghost" : "primary"}">Client credentials</button>`);
  }
  buttons.push('<button class="ghost creds-refresh">Refresh status</button>');
  return `<div style="border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px">
    <label style="display:flex; justify-content:space-between">
      <span>${esc(s.name)} <span class="meta">(${kind}${s.detail ? " · " + esc(s.detail) : ""})</span></span> ${badge}
    </label>
    <div style="display:grid; gap:6px; margin-top:6px">
      <input id="oa-cid-${i}" placeholder="Client ID" />
      <input id="oa-sec-${i}" type="password" placeholder="Client Secret${clientCreds ? " (required for M2M)" : " (if required)"}" />
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        ${buttons.join("")}
      </div>
    </div>
  </div>`;
}

async function regenerate(id) {
  try {
    const { summary } = await api("/servers/" + id + "/regenerate", { method: "POST" });
    toast("Regenerated: " + summary.split("\n")[0]);
    selectServer(id);
  } catch (e) { toast(e.message); }
}

async function removeServer(id, name) {
  if (!confirm('Delete server "' + name + '"?')) return;
  try {
    await fetch("/servers/" + id, { method: "DELETE" });
    selected = null;
    $("#detail").innerHTML = '<div class="empty">Server deleted.</div>';
    loadServers();
    toast("Deleted");
  } catch (e) { toast(e.message); }
}

$("#create-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("#create-btn");
  btn.disabled = true; btn.textContent = "Creating…";
  try {
    const payload = { spec: $("#f-spec").value.trim() };
    if ($("#f-name").value.trim()) payload.name = $("#f-name").value.trim();
    if ($("#f-base").value.trim()) payload.baseUrl = $("#f-base").value.trim();
    const created = await api("/servers", {
      method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(payload),
    });
    $("#f-spec").value = ""; $("#f-name").value = ""; $("#f-base").value = "";
    toast('Created "' + created.name + '"');
    await selectServer(created.id);
  } catch (e) { toast(e.message); }
  finally { btn.disabled = false; btn.textContent = "Create server"; }
});

// Admin token: persist to localStorage and reload on change.
const tokenInput = $("#admin-token");
tokenInput.value = adminToken();
tokenInput.addEventListener("change", () => {
  localStorage.setItem("wrangl_admin_token", tokenInput.value.trim());
  selected = null;
  $("#detail").innerHTML = '<div class="empty">Select a server, or create one to get started.</div>';
  loadServers().catch((e) => toast(e.message));
});

loadServers().catch((e) => toast(e.message));
</script>

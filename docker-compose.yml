services:
  wrangl:
    build: .
    image: wrangl:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # Required — refuse to start without them (they secure the deployment).
      WRANGL_SECRET_KEY: ${WRANGL_SECRET_KEY:?set WRANGL_SECRET_KEY (encrypts credentials + OAuth tokens)}
      WRANGL_ADMIN_TOKEN: ${WRANGL_ADMIN_TOKEN:?set WRANGL_ADMIN_TOKEN (gates the management API)}
      # Public https origin behind your TLS proxy — used for OAuth redirect URIs.
      WRANGL_PUBLIC_URL: ${WRANGL_PUBLIC_URL:-http://localhost:4000}
    volumes:
      - wrangl-data:/data

volumes:
  wrangl-data:

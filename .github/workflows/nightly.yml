name: Nightly

on:
  schedule:
    # 06:15 UTC daily — catch catalog/spec drift against the public internet.
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # Intentionally no WRANGL_SKIP_NETWORK — exercises Petstore/GitHub/Stripe etc.
      - run: npm test

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wrangl
          POSTGRES_PASSWORD: wrangl
          POSTGRES_DB: wrangl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wrangl -d wrangl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          WRANGL_SKIP_NETWORK: "1"
          WRANGL_PG_URL: postgres://wrangl:wrangl@localhost:5432/wrangl

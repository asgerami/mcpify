# Multi-replica-capable deployment: Wrangl + a shared Postgres.
#   docker compose -f docker-compose.postgres.yml up -d
# All replicas share server records, credentials, OAuth tokens, and usage logs
# via Postgres, so state survives any single container and scales horizontally.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wrangl}
      POSTGRES_DB: wrangl
    volumes:
      - wrangl-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wrangl"]
      interval: 5s
      timeout: 3s
      retries: 10

  wrangl:
    build: .
    image: wrangl:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      WRANGL_SECRET_KEY: ${WRANGL_SECRET_KEY:?set WRANGL_SECRET_KEY (encrypts credentials + OAuth tokens)}
      WRANGL_ADMIN_TOKEN: ${WRANGL_ADMIN_TOKEN:?set WRANGL_ADMIN_TOKEN (gates the management API)}
      WRANGL_PUBLIC_URL: ${WRANGL_PUBLIC_URL:-http://localhost:4000}
      # All replicas point at the shared database.
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-wrangl}@db:5432/wrangl
    # To run multiple replicas, remove the static `ports` mapping above, put a
    # load balancer (Caddy/nginx) in front with session affinity, and scale:
    #   docker compose -f docker-compose.postgres.yml up -d --scale wrangl=3

volumes:
  wrangl-pg:
